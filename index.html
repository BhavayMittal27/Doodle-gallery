<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHAVI KA KHET</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon-DCBy5TG2.svg">
  <script type="module" crossorigin src="./assets/index-BZ2U3udU.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Cx5uTkQ2.css">
</head>
<body class="theme-garden">

  <!-- Main Scroll Container -->
  <div class="garden-wrapper-root">
    <h1 class="garden-title hand-drawn">BHAVI KA KHET</h1>
    
    <div class="garden-main-layout">
      <!-- Left/Center: Bobbing Grassy Island -->
      <div class="island-container">
        <div class="island-bobbing-wrapper" id="island-wrapper">
          <img src="./assets/island-ClIW858p.png" alt="Garden island" class="garden-island-img">
          <!-- Scattered Flowers Layer -->
          <div class="flowers-layer" id="constellations-layer"></div>
        </div>
      </div>
      
      <!-- Right: Drawing Studio (Desktop: visible; Mobile: drawer overlay) -->
      <div class="studio-panel-column" id="forge-panel">
        <!-- Close drawer button for mobile screen mode -->
        <button class="close-drawer-btn" id="close-drawer-btn" aria-label="Close drawing panel">&times;</button>
        
        <p class="studio-subtitle hand-drawn">Add flowers to our garden?</p>
        
        <div class="studio-canvas-layout">
          <!-- Absolute Left: Color Palette Column -->
          <div class="color-palette-wrap">
            <div class="color-palette" id="color-palette">
              <!-- Rebuilt dynamically in JS with the 5 exact colors -->
            </div>
          </div>
          
          <!-- Center: Canvas Area -->
          <div class="canvas-box-wrap">
            <div class="canvas-container">
              <canvas id="paint-canvas" tabindex="0" role="application" aria-label="Drawing canvas - use mouse, touch, or arrow keys to draw"></canvas>
              <!-- Absolute top-right reset/clear button -->
              <button id="clear-btn" class="canvas-clear-icon-btn" title="Clear drawing" aria-label="Clear canvas">↺</button>
            </div>
            
            <div class="planting-form">
              <button id="save-gallery-btn" class="garden-btn primary-btn hand-drawn" disabled>
                🌱 Plant
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile-only draw trigger button -->
    <button id="mobile-draw-btn" class="garden-mobile-draw-btn hand-drawn">
      🌸 Draw a flower
    </button>
    
    <!-- Fixed gallery floating link -->
    <a href="#gallery-archive" class="floating-gallery-link hand-drawn" id="mobile-gallery-btn" title="See flower gallery">
      🖼️ See flower gallery
    </a>
  </div>

  <!-- Fullscreen Flower Gallery Overlay -->
  <section id="gallery-archive" class="archive-section">
    <div class="gallery-container">
      <div class="gallery-header-row">
        <h2 class="gallery-header-title hand-drawn">Flower Gallery</h2>
        <button class="close-gallery-btn hand-drawn" id="close-gallery-btn">
          ← Back to Garden
        </button>
      </div>
      
      <div id="gallery-empty-state" class="empty-state hidden">
        <div class="empty-state-icon">🌸</div>
        <h4 class="hand-drawn">No flowers found</h4>
        <p>Be the first to plant a flower in this garden!</p>
        <button id="empty-state-draw-btn" class="garden-btn primary-btn hand-drawn">Start Drawing</button>
      </div>

      <div class="archive-grid" id="archive-grid">
        <!-- Populate dynamically in app.js -->
      </div>

      <!-- Gallery Pagination -->
      <div class="gallery-pagination" id="gallery-pagination">
        <button id="prev-page-btn" class="close-gallery-btn hand-drawn" disabled>← Previous</button>
        <span id="page-info" class="hand-drawn">Page 1 of 1</span>
        <button id="next-page-btn" class="close-gallery-btn hand-drawn" disabled>Next →</button>
      </div>
    </div>
  </section>

  <!-- Notification Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Unsaved Changes Modal -->
  <div id="unsaved-modal" class="lightbox-modal">
    <div class="lightbox-overlay" id="unsaved-close-overlay"></div>
    <div class="lightbox-container alert-container">
      <h3 class="hand-drawn">Unsaved Work</h3>
      <p>You have unsaved changes. Discard and close?</p>
      <div class="modal-buttons">
        <button id="confirm-discard-btn" class="garden-btn danger-btn hand-drawn">Discard</button>
        <button id="cancel-discard-btn" class="garden-btn secondary-btn hand-drawn">Keep Drawing</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
</body>
</html>
